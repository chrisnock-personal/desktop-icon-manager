<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background gradient: soft blue-indigo -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8EF7"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <!-- Gear fill gradient -->
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#D8E8FF" stop-opacity="0.90"/>
    </linearGradient>
    <!-- Small image card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F0FF"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2D3A8C" flood-opacity="0.25"/>
    </filter>
    <filter id="cardshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#2D3A8C" flood-opacity="0.20"/>
    </filter>
    <!-- Clip for rounded square background -->
    <clipPath id="bgClip">
      <rect width="128" height="128" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Subtle inner highlight at top -->
  <ellipse cx="64" cy="10" rx="52" ry="22" fill="#FFFFFF" fill-opacity="0.12"/>

  <!-- ── GEAR ────────────────────────────────────────────────────────────── -->
  <!-- Gear: 8 teeth, centred at 64,68, outer r=44, inner r=33, hub r=14   -->
  <g filter="url(#shadow)">
    <path fill="url(#gearGrad)" d="
      M 64,24
      L 69,30 L 76,28 L 79,35 L 87,35 L 88,43
      L 96,46 L 94,54 L 101,59 L 96,66
      L 100,73 L 93,77 L 93,85 L 85,86
      L 82,94 L 74,92 L 69,99 L 62,96
      L 55,100 L 50,93 L 42,94 L 40,86
      L 32,84 L 32,76 L 25,72 L 29,65
      L 24,58 L 31,53 L 29,45 L 37,43
      L 38,35 L 46,34 L 50,27 L 57,30 Z
    "/>
    <!-- Gear hole (hub) -->
    <circle cx="64" cy="63" r="15" fill="url(#bg)"/>
  </g>

  <!-- ── IMAGE CARDS (stack of two, representing icons) ──────────────────── -->
  <!-- Back card — slightly rotated, peeking out -->
  <g transform="rotate(-8, 64, 63)" filter="url(#cardshadow)">
    <rect x="43" y="48" width="32" height="26" rx="4" ry="4"
          fill="#A8C8FF" fill-opacity="0.85"/>
    <!-- Mountain/landscape pictogram on back card -->
    <polygon points="48,69 55,58 62,66 66,62 71,69" fill="#6C9FE8" fill-opacity="0.7"/>
    <!-- Sun dot -->
    <circle cx="69" cy="57" r="2.5" fill="#FFD166" fill-opacity="0.85"/>
  </g>

  <!-- Front card — straight, on top -->
  <g filter="url(#cardshadow)">
    <rect x="50" y="45" width="33" height="27" rx="4" ry="4" fill="url(#cardGrad)"/>
    <!-- Card top bar (title strip) -->
    <rect x="50" y="45" width="33" height="7" rx="4" ry="4" fill="#4F8EF7" fill-opacity="0.75"/>
    <rect x="50" y="49" width="33" height="3" rx="0" fill="#4F8EF7" fill-opacity="0.75"/>
    <!-- Mountain/landscape pictogram on front card -->
    <polygon points="55,68 62,57 69,65 73,61 78,68" fill="#4F8EF7" fill-opacity="0.55"/>
    <!-- Sun dot -->
    <circle cx="76" cy="52" r="2.5" fill="#FFD166"/>
  </g>
</svg>
